video:
  fps: 3

  image_format: jpg

  jpeg_quality: 95

paths:
  input_video: data/raw_videos

  output_frames: data/extracted_frames

  reports: reports

  manifests: data/manifests

  manifest: data/manifests/shoe_manifest.csv

validation:
  supported_formats:
    - jpg
    - jpeg
    - png

blur:
  method: laplacian

  threshold: 25

  save_preview: true

duplicates:
  method: phash

  threshold: 5
